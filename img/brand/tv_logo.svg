<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Глубокая тень для текста -->
    <filter id="text-depth" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feFlood flood-color="black" flood-opacity="0.9" />
      <feComposite in2="blur" operator="in" result="shadow" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Неоновое свечение элементов -->
    <filter id="ultra-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur1" />
      <feGaussianBlur stdDeviation="10" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="main-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#00e5ff" />
    </linearGradient>

    <style>
      @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes spin-fast { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
      @keyframes scan { 0% { stroke-dashoffset: 1000; } 100% { stroke-dashoffset: 0; } }
      
      .layer-1 { transform-origin: center; animation: spin-slow 30s linear infinite; }
      .layer-2 { transform-origin: center; animation: spin-fast 15s linear infinite; }
      .scanner { stroke-dasharray: 200 800; animation: scan 4s linear infinite; }
      .txt { font-family: 'Montserrat', sans-serif; font-weight: 900; text-anchor: middle; filter: url(#text-depth); }
    </style>
  </defs>

  <!-- Внешний Реактор -->
  <g class="layer-1">
    <circle cx="300" cy="300" r="280" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.2" />
    <circle cx="300" cy="300" r="265" fill="none" stroke="#00e5ff" stroke-width="1.5" class="scanner" opacity="0.6" />
    <circle cx="300" cy="300" r="255" fill="none" stroke="white" stroke-width="0.5" stroke-dasharray="2 15" opacity="0.4" />
  </g>

  <!-- Кинопленка (Объемная) -->
  <g class="layer-2" filter="url(#ultra-glow)">
    <circle cx="300" cy="300" r="220" fill="none" stroke="#00e5ff" stroke-width="40" opacity="0.05" />
    <circle cx="300" cy="300" r="235" fill="none" stroke="white" stroke-width="8" stroke-dasharray="12 18" />
    <circle cx="300" cy="300" r="205" fill="none" stroke="white" stroke-width="8" stroke-dasharray="15 15" />
  </g>

  <!-- Текст с градиентом и тенью -->
  <g>
    <!-- Уменьшено со 100 до 85 -->
    <text x="300" y="295" class="txt" font-size="80" fill="url(#main-grad)" letter-spacing="-2">МИНИ</text>
    <!-- Уменьшено с 65 до 55 -->
    <text x="300" y="360" class="txt" font-size="49" fill="white" letter-spacing="8">СЕРИАЛЫ</text>
  </g>

  <!-- Финальный лоск -->
  <circle cx="200" cy="200" r="100" fill="white" opacity="0.03" filter="blur(40px)" />
</svg>